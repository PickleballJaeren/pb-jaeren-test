<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#050f1f">
<title>Live Turnering</title>
<style>
  :root {
    --navy:    #050f1f;
    --navy2:   #0a1628;
    --navy3:   #0d1e35;
    --border:  rgba(30,45,69,.8);
    --border2: rgba(30,45,69,1);
    --white:   #e8f0f8;
    --muted:   #4a6080;
    --muted2:  #7a90a8;
    --green:   #16a34a;
    --green2:  #22c55e;
    --yellow:  #f5c842;
    --accent:  #3b82f6;
    --accent2: #60a5fa;
    --red2:    #ef4444;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--navy); color: var(--white); font-family: 'DM Sans', system-ui, sans-serif; }

  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap');

  /* ── HEADER ── */
  .viewer-header {
    position: sticky; top: 0; z-index: 10;
    background: var(--navy2);
    border-bottom: 1px solid var(--border2);
    padding: calc(var(--safe-top) + 12px) 16px 0;
  }
  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .turnering-navn {
    font-family: 'Bebas Neue', cursive;
    font-size: 24px; letter-spacing: 1.5px; color: var(--yellow);
  }
  .live-pill {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(34,197,94,.12);
    border: 1px solid rgba(34,197,94,.3);
    color: var(--green2); font-size: 12px; font-weight: 600;
    padding: 4px 10px; border-radius: 20px; letter-spacing: .5px;
  }
  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green2);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .ferdig-pill {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(96,165,250,.12);
    border: 1px solid rgba(96,165,250,.3);
    color: var(--accent2); font-size: 12px; font-weight: 600;
    padding: 4px 10px; border-radius: 20px;
  }

  /* ── TABS ── */
  .tab-bar {
    display: flex; gap: 0;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex-shrink: 0; padding: 10px 16px;
    font-size: 14px; font-weight: 500; color: var(--muted);
    background: none; border: none; cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color .15s, border-color .15s;
  }
  .tab-btn.aktiv { color: var(--yellow); border-bottom-color: var(--yellow); }

  /* ── CONTENT ── */
  .tab-innhold { display: none; padding: 16px; }
  .tab-innhold.aktiv { display: block; }

  /* ── FELLES ── */
  .seksjon-tittel {
    font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--muted2); font-weight: 600; margin: 16px 0 8px;
  }
  .kort {
    background: var(--navy3);
    border: 1px solid var(--border2);
    border-radius: 12px; overflow: hidden;
    margin-bottom: 10px;
  }

  /* ── BRACKET ── */
  .bracket-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 8px; }
  .bracket-nivaa { margin-bottom: 24px; }
  .nivaa-tittel {
    font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px;
    font-weight: 700; margin-bottom: 10px;
  }
  .bracket-runder {
    display: flex; gap: 12px; align-items: flex-start;
    min-width: max-content;
  }
  .runde-kol { min-width: 160px; }
  .runde-navn {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted2); font-weight: 600; margin-bottom: 8px; text-align: center;
  }
  .kamp-kort {
    background: var(--navy3); border: 1px solid var(--border2);
    border-radius: 10px; overflow: hidden; margin-bottom: 8px;
  }
  .kamp-kort.live { border-color: var(--green2); }
  .kamp-rad {
    display: flex; align-items: center; padding: 8px 10px; gap: 8px;
    border-bottom: 1px solid var(--border);
  }
  .kamp-rad:last-child { border-bottom: none; }
  .kamp-lagnavn { flex: 1; font-size: 14px; color: var(--muted2); }
  .kamp-lagnavn.vinner { color: var(--white); font-weight: 600; }
  .kamp-lagnavn.tbd { color: var(--muted); font-style: italic; font-size: 13px; }
  .kamp-poeng { font-family: 'DM Mono', monospace; font-size: 16px; color: var(--green2); }
  .kamp-poeng.tap { color: var(--muted2); }
  .kamp-poeng.venter { color: var(--muted); font-size: 12px; }
  .kamp-klikkbar { cursor: default; }

  /* ── TABELL ── */
  .pulje-tabell { width: 100%; border-collapse: collapse; font-size: 14px; }
  .pulje-tabell th {
    padding: 8px 10px; text-align: left; font-size: 12px;
    color: var(--muted2); font-weight: 500; border-bottom: 1px solid var(--border2);
  }
  .pulje-tabell td { padding: 10px 10px; border-bottom: 1px solid var(--border); }
  .pulje-tabell tr:last-child td { border-bottom: none; }
  .rang-gull { font-family: 'Bebas Neue', cursive; font-size: 18px; color: var(--yellow); }
  .rang-sølv { font-family: 'Bebas Neue', cursive; font-size: 18px; color: var(--accent2); }
  .rang-grå  { font-family: 'Bebas Neue', cursive; font-size: 18px; color: var(--muted); }
  .pd-pos { color: var(--green2); font-family: monospace; }
  .tb-kant-inn  { border-left: 3px solid var(--accent2); padding-left: 5px; display:inline-block; }
  .tb-kant-pd   { border-left: 3px solid var(--yellow);  padding-left: 5px; display:inline-block; }
  .tb-kant-ingen{ display:inline-block; }
  .tb-fotnote   { font-size: 12px; color: var(--muted2); padding: 8px 12px 10px; display: flex; gap: 14px; flex-wrap: wrap; }
  .tb-dot       { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }

  /* ── KAMPSKJEMA ── */
  .ks-wrap { padding: 12px 16px; display: flex; flex-direction: column; gap: 0; }
  .ks-hdr  { padding: 12px 0 8px; display: flex; align-items: center; justify-content: space-between; }
  .ks-tittel { font-family: 'Bebas Neue', cursive; font-size: 20px; letter-spacing: 1px; color: var(--yellow); }
  .ks-sub    { font-size: 12px; color: var(--accent2); }
  .ks-prog-bar  { height: 3px; background: var(--border2); border-radius: 2px; margin-bottom: 12px; }
  .ks-prog-fill { height: 3px; background: var(--yellow); border-radius: 2px; transition: width .4s; }
  .ks-seksjon { font-size: 11px; color: var(--accent2); letter-spacing: .3px; padding: 8px 0 5px; }
  .ks-seksjon-gronn { font-size: 11px; color: var(--green2); letter-spacing: .3px; padding: 8px 0 5px; display: flex; align-items: center; gap: 6px; }
  .ks-puls { width: 7px; height: 7px; border-radius: 50%; background: var(--green2); flex-shrink: 0; animation: ksPuls 1.4s ease-in-out infinite; }
  @keyframes ksPuls { 0%,100%{opacity:1} 50%{opacity:.25} }
  .ks-kort { background: #060e1c; border: 1px solid #1a2a40; border-radius: 12px; overflow: hidden; margin-bottom: 10px; }
  .ks-scroll { overflow-x: auto; }
  .ks-table { border-collapse: collapse; width: 100%; }
  .ks-table td { border-right: 1px solid #0d1e33; border-bottom: 1px solid #0d1e33; vertical-align: top; padding: 8px 8px; min-width: 58px; }
  .ks-table td:last-child { border-right: none; }
  .ks-table tr:last-child td { border-bottom: none; }
  .ks-rtd { background: #060e1c; font-size: 11px; font-weight: 500; color: #475569; text-align: center; vertical-align: middle; padding: 0 5px; border-right: 1px solid #1a2a40; min-width: 36px; }
  .ks-l1  { font-size: 13px; color: #f1f5f9; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60px; }
  .ks-sk  { font-size: 10px; color: #378add; margin: 1px 0; }
  .ks-l2  { font-size: 13px; color: #f1f5f9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60px; }
  .ks-vinner { font-size: 13px; font-weight: 500; color: #eab308; }
  .ks-taper  { font-size: 13px; color: #f1f5f9; }
  .ks-rv { font-size: 12px; font-weight: 500; color: #eab308; }
  .ks-rt { font-size: 12px; color: #f1f5f9; }
  .ks-gronn-rad td { background: #0c1e3a; border-right-color: #1a2e4a; border-bottom-color: #1a2e4a; }
  .ks-gronn-rad .ks-rtd { background: #0c1e3a; color: #22c55e; font-weight: 700; border-right-color: #1a2e4a; }
  .ks-dim { opacity: .35; }
  .pd-neg { color: var(--red2); font-family: monospace; }
  .pd-nøy { color: var(--muted2); font-family: monospace; }

  /* ── KAMPER ── */
  .kamp-liste-item {
    padding: 10px 12px; border-bottom: 1px solid var(--border);
  }
  .kamp-liste-item:last-child { border-bottom: none; }
  .kamp-meta { font-size: 11px; color: var(--muted2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .5px; }
  .kamp-lag-rad { display: flex; justify-content: space-between; padding: 2px 0; font-size: 14px; }
  .kamp-lag-navn { color: var(--muted2); }
  .kamp-lag-navn.v { color: var(--white); font-weight: 600; }
  .kamp-lag-score { font-family: monospace; font-size: 14px; color: var(--green2); }
  .kamp-lag-score.t { color: var(--muted2); }

  /* ── RANGERING ── */
  .rang-rad {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border-bottom: 1px solid var(--border);
  }
  .rang-rad:last-child { border-bottom: none; }
  .rang-rad.gull { background: rgba(245,200,66,.05); }
  .rang-rad.sølv { background: rgba(96,165,250,.04); }
  .rang-rad.bronse { background: rgba(205,124,63,.04); }
  .rang-nummer {
    font-family: 'Bebas Neue', cursive; font-size: 22px;
    width: 36px; text-align: center; flex-shrink: 0;
  }
  .rang-lagnavn { flex: 1; font-size: 17px; font-weight: 500; }
  .rang-plass { font-family: 'Bebas Neue', cursive; font-size: 18px; color: var(--muted); }

  /* ── GAME-DETALJER (best av 3) ── */
  .game-detaljer {
    font-size: 11px;
    color: var(--muted2);
    margin-top: 3px;
    letter-spacing: .3px;
    padding: 0 10px 6px;
  }
  .game-detaljer .g-vinner { color: var(--green2); }
  .game-detaljer .g-taper  { color: var(--muted2); }
  .game-detaljer .g-skille { color: var(--muted);  }

  /* ── SPLIT-VISNING ── */
  .split-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    align-items: start;
  }
  .split-seksjon-tittel {
    font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--muted2); font-weight: 600; margin-bottom: 10px;
  }
  @media (max-width: 680px) {
    .split-grid { grid-template-columns: 1fr; }
  }

  /* ── LOADING / TOM ── */
  .laster {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 14px; padding: 60px 20px;
    color: var(--muted2); font-size: 16px;
  }
  .snurr {
    width: 36px; height: 36px; border-radius: 50%;
    border: 3px solid var(--border2);
    border-top-color: var(--yellow);
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .tom { text-align: center; padding: 40px 20px; color: var(--muted2); font-size: 16px; }
  .feil-boks {
    margin: 20px; padding: 16px; background: rgba(220,38,38,.1);
    border: 1px solid rgba(220,38,38,.3); border-radius: 12px;
    color: #fca5a5; font-size: 15px; text-align: center;
  }
</style>
</head>
<body>

<div id="app">
  <div class="laster" id="global-laster">
    <div class="snurr"></div>
    Laster turnering…
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {
  getFirestore, doc, onSnapshot,
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ── Firebase-konfig (speiler firebase.js) ────────────────
const BRUK_MILJO = 'test'; // bytt til 'prod' ved produksjon
const FB_CONFIGS = {
  prod: {
    apiKey: 'AIzaSyB_0rxDzHpV2HB6JdHm8SEHoGc8vE2F_rE',
    authDomain: 'pickle-rank-5fbe5.firebaseapp.com',
    projectId: 'pickle-rank-5fbe5',
  },
  test: {
    apiKey: 'AIzaSyByUGIQJwohLKWB2x7_qqOMWdi965Ph7ZE',
    authDomain: 'pickle-rank-test.firebaseapp.com',
    projectId: 'pickle-rank-test',
  },
};

const fbApp = initializeApp(FB_CONFIGS[BRUK_MILJO]);
const db    = getFirestore(fbApp);

// ── Hent turneringsID fra URL ─────────────────────────────
const params      = new URLSearchParams(location.search);
const turneringId = params.get('vis');

if (!turneringId) {
  document.getElementById('app').innerHTML =
    '<div class="feil-boks">Ingen turneringsID i URL. Bruk ?vis=TURNERING_ID</div>';
} else {
  startLytter(turneringId);
}

// ── Aktiv fane ────────────────────────────────────────────
let _aktivFane = 'bracket';

function byttFane(fane) {
  _aktivFane = fane;
  document.querySelectorAll('.tab-btn').forEach(b =>
    b.classList.toggle('aktiv', b.dataset.fane === fane)
  );
  document.querySelectorAll('.tab-innhold').forEach(el =>
    el.classList.toggle('aktiv', el.id === 'fane-' + fane)
  );
}

// ── Sanntids-lytter ───────────────────────────────────────
function startLytter(id) {
  onSnapshot(doc(db, 'turneringer', id),
    snap => {
      if (!snap.exists()) {
        document.getElementById('app').innerHTML =
          '<div class="feil-boks">Turnering ikke funnet.</div>';
        return;
      }
      render({ id: snap.id, ...snap.data() });
    },
    err => {
      document.getElementById('app').innerHTML =
        `<div class="feil-boks">Tilkoblingsfeil: ${err.message}</div>`;
    }
  );
}

// ── Hoved-render ──────────────────────────────────────────
function render(t) {
  document.title = (t.navn ?? 'Turnering') + ' — Live';
  const lagMap   = Object.fromEntries((t.lag ?? []).map(l => [l.id, l]));
  const erFerdig = t.status === 'finished';
  const erAktiv  = ['group_play', 'playoffs', 'playoff_seeding'].includes(t.status);

  const pill = erFerdig
    ? `<span class="ferdig-pill">Ferdig</span>`
    : erAktiv
      ? `<span class="live-pill"><span class="live-dot"></span>LIVE</span>`
      : `<span class="ferdig-pill" style="color:var(--muted2);border-color:var(--muted)">Oppsett</span>`;

  document.getElementById('app').innerHTML = `
    <div class="viewer-header">
      <div class="header-top">
        <div class="turnering-navn">${esc(t.navn ?? 'Turnering')}</div>
        ${pill}
      </div>
      <div class="tab-bar">
        <button class="tab-btn${_aktivFane==='bracket'?' aktiv':''}" data-fane="bracket" onclick="byttFane('bracket')">Bracket</button>
        <button class="tab-btn${_aktivFane==='tabeller'?' aktiv':''}" data-fane="tabeller" onclick="byttFane('tabeller')">Tabeller</button>
        <button class="tab-btn${_aktivFane==='split'?' aktiv':''}" data-fane="split" onclick="byttFane('split')">Oversikt</button>
        <button class="tab-btn${_aktivFane==='kamper'?' aktiv':''}" data-fane="kamper" onclick="byttFane('kamper')">Kamper</button>
        <button class="tab-btn${_aktivFane==='kampskjema'?' aktiv':''}" data-fane="kampskjema" onclick="byttFane('kampskjema')">Kampskjema</button>
        <button class="tab-btn${_aktivFane==='rangering'?' aktiv':''}" data-fane="rangering" onclick="byttFane('rangering')">Rangering</button>
      </div>
    </div>

    <div id="fane-bracket" class="tab-innhold${_aktivFane==='bracket'?' aktiv':''}">
      ${renderBracket(t, lagMap)}
    </div>
    <div id="fane-tabeller" class="tab-innhold${_aktivFane==='tabeller'?' aktiv':''}">
      ${renderTabeller(t, lagMap)}
    </div>
    <div id="fane-split" class="tab-innhold${_aktivFane==='split'?' aktiv':''}">
      ${renderSplit(t, lagMap)}
    </div>
    <div id="fane-kamper" class="tab-innhold${_aktivFane==='kamper'?' aktiv':''}">
      ${renderKamper(t, lagMap)}
    </div>
    <div id="fane-kampskjema" class="tab-innhold${_aktivFane==='kampskjema'?' aktiv':''}">
      ${renderKampskjema(t, lagMap)}
    </div>
    <div id="fane-rangering" class="tab-innhold${_aktivFane==='rangering'?' aktiv':''}">
      ${renderRangering(t, lagMap)}
    </div>
  `;

  window.byttFane = byttFane;
}

// ── SPLIT-VISNING ─────────────────────────────────────────
function renderSplit(t, lagMap) {
  const harSluttspill = t.sluttspill?.A?.kamper?.length || t.sluttspill?.B?.kamper?.length || t.sluttspill?.C?.kamper?.length;
  const harPuljer     = (t.puljer ?? []).length > 0;

  if (!harSluttspill && !harPuljer) {
    return '<div class="tom">Ingen data å vise ennå.</div>';
  }

  return `
    <div class="split-grid">
      <div>
        <div class="split-seksjon-tittel">Tabeller</div>
        ${renderTabeller(t, lagMap)}
      </div>
      <div>
        <div class="split-seksjon-tittel">Bracket</div>
        ${renderBracket(t, lagMap)}
      </div>
    </div>`;
}

// ── BRACKET ───────────────────────────────────────────────
function renderBracket(t, lagMap) {
  const sl = t.sluttspill;
  if (!sl?.A && !sl?.B && !sl?.C) {
    if (t.status === 'group_play') return '<div class="tom">Puljespill pågår — bracket genereres etter puljefasen.</div>';
    return '<div class="tom">Sluttspill ikke startet ennå.</div>';
  }

  let html = '<div class="bracket-scroll">';

  const renderNivaa = (nivaa, kamper, farge, tittel) => {
    if (!kamper?.length) return '';
    const runder = grupperPerRunde(kamper);
    let h = `<div class="bracket-nivaa"><div class="nivaa-tittel" style="color:${farge}">${tittel}</div><div class="bracket-runder">`;
    for (const [rundeNavn, kampListe] of runder) {
      h += `<div class="runde-kol"><div class="runde-navn">${esc(rundeNavn)}</div>`;
      for (const k of kampListe) {
        const l1    = lagMap[k.lag1Id]?.navn ?? (k.lag1Id ? '?' : 'TBD');
        const l2    = lagMap[k.lag2Id]?.navn ?? (k.lag2Id ? '?' : 'TBD');
        const v1    = k.ferdig && k.lag1Poeng > k.lag2Poeng;
        const v2    = k.ferdig && k.lag2Poeng > k.lag1Poeng;
        const tbd1  = !k.lag1Id;
        const tbd2  = !k.lag2Id;
        h += `<div class="kamp-kort${!k.ferdig && k.lag1Id && k.lag2Id ? ' live' : ''}">
          <div class="kamp-rad">
            <div class="kamp-lagnavn${v1?' vinner':''}${tbd1?' tbd':''}">${esc(l1)}</div>
            ${k.ferdig ? `<div class="kamp-poeng${v1?'':' tap'}">${k.lag1Poeng}</div>` : `<div class="kamp-poeng venter">—</div>`}
          </div>
          <div class="kamp-rad">
            <div class="kamp-lagnavn${v2?' vinner':''}${tbd2?' tbd':''}">${esc(l2)}</div>
            ${k.ferdig ? `<div class="kamp-poeng${v2?'':' tap'}">${k.lag2Poeng}</div>` : `<div class="kamp-poeng venter">—</div>`}
          </div>
          ${gameDetaljerHTML(k)}
        </div>`;
      }
      h += '</div>';
    }
    h += '</div></div>';
    return h;
  };

  html += renderNivaa('A', sl.A?.kamper, '#f5c842', 'A-sluttspill');
  html += renderNivaa('B', sl.B?.kamper, '#60a5fa', 'B-sluttspill');
  html += renderNivaa('C', sl.C?.kamper, '#7a90a8', 'C-sluttspill');
  html += '</div>';
  return html;
}

function grupperPerRunde(kamper) {
  const rekkefølge = ['Åttedelsfinale','Kvartfinale','Plass 5–8','Semifinale','3. plass','7. plass','5. plass','1. plass','9. plass','11. plass','13. plass','14. plass','15. plass','16. plass','17. plass','19. plass','21. plass','23. plass'];
  const map = {};
  for (const k of kamper) {
    const r = k.runde ?? 'Ukjent';
    if (!map[r]) map[r] = [];
    map[r].push(k);
  }
  return Object.entries(map).sort(([a],[b]) => {
    const ia = rekkefølge.indexOf(a), ib = rekkefølge.indexOf(b);
    return (ia===-1?99:ia) - (ib===-1?99:ib);
  });
}

// ── TABELLER ─────────────────────────────────────────────
function renderTabeller(t, lagMap) {
  const puljer = t.puljer ?? [];
  if (!puljer.length) return '<div class="tom">Ingen puljekamper ennå.</div>';

  return puljer.map(p => {
    const stats = {};
    for (const id of p.lagIds ?? []) stats[id] = { lagId:id, seire:0, tap:0, pf:0, pm:0, pd:0 };
    for (const k of p.kamper ?? []) {
      if (!k.ferdig) continue;
      const s1 = stats[k.lag1Id], s2 = stats[k.lag2Id];
      if (!s1||!s2) continue;
      s1.pf += k.lag1Poeng; s1.pm += k.lag2Poeng;
      s2.pf += k.lag2Poeng; s2.pm += k.lag1Poeng;
      if (k.lag1Poeng > k.lag2Poeng) { s1.seire++; s2.tap++; }
      else { s2.seire++; s1.tap++; }
    }
    for (const s of Object.values(stats)) s.pd = s.pf - s.pm;

    const sorted = _sorterMedTiebreak(Object.values(stats), p.kamper ?? []);

    const harInnbyrdes = sorted.some(r => r.tiebreakType === 'innbyrdes');
    const harPoengdiff = sorted.some(r => r.tiebreakType === 'poengdiff');
    let fotnote = '';
    if (harInnbyrdes || harPoengdiff) {
      fotnote = '<div class="tb-fotnote">';
      if (harInnbyrdes) fotnote += '<span><span class="tb-dot" style="background:var(--accent2)"></span>Skilt via innbyrdes oppgjør</span>';
      if (harPoengdiff) fotnote += '<span><span class="tb-dot" style="background:var(--yellow)"></span>Skilt via poengdiff (sirkeloppgjør)</span>';
      fotnote += '</div>';
    }

    return `<div class="seksjon-tittel">${esc(p.navn)}</div>
    <div class="kort"><table class="pulje-tabell">
      <thead><tr>
        <th>#</th><th>Lag</th>
        <th style="text-align:center">S</th>
        <th style="text-align:center">T</th>
        <th style="text-align:right">PD</th>
        <th style="text-align:right">PF</th>
      </tr></thead>
      <tbody>${sorted.map((s,i) => {
        const pd = s.pd;
        const rankKl  = i < 2 ? (i===0?'rang-gull':'rang-sølv') : 'rang-grå';
        const pdKl    = pd > 0 ? 'pd-pos' : pd < 0 ? 'pd-neg' : 'pd-nøy';
        const kantKl  = s.tiebreakType === 'innbyrdes' ? 'tb-kant-inn'
                      : s.tiebreakType === 'poengdiff'  ? 'tb-kant-pd'
                      : 'tb-kant-ingen';
        return `<tr>
          <td><span class="${rankKl}"><span class="${kantKl}">${i+1}</span></span></td>
          <td style="font-weight:${i<2?500:400}">${esc(lagMap[s.lagId]?.navn ?? s.lagId)}</td>
          <td style="text-align:center;color:var(--green2)">${s.seire}</td>
          <td style="text-align:center;color:var(--muted2)">${s.tap}</td>
          <td style="text-align:right" class="${pdKl}">${pd>0?'+':''}${pd}</td>
          <td style="text-align:right;color:var(--muted2);font-family:monospace">${s.pf}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>${fotnote}</div>`;
  }).join('');
}

function _sorterMedTiebreak(lagListe, kamper) {
  const grov = [...lagListe].sort((a, b) => b.seire - a.seire);
  const resultat = [];
  let i = 0;
  while (i < grov.length) {
    let j = i + 1;
    while (j < grov.length && grov[j].seire === grov[i].seire) j++;
    const gruppe = grov.slice(i, j);
    if (gruppe.length === 1) {
      gruppe[0].tiebreakType = null;
      resultat.push(gruppe[0]);
    } else {
      resultat.push(..._sorterGruppeInnbyrdes(gruppe, kamper));
    }
    i = j;
  }
  return resultat;
}

function _sorterGruppeInnbyrdes(gruppe, kamper) {
  const ids  = new Set(gruppe.map(l => l.lagId));
  const mini = {};
  gruppe.forEach(l => { mini[l.lagId] = { seire: 0 }; });
  for (const k of kamper) {
    if (!k.ferdig || k.lag1Poeng == null || k.lag2Poeng == null) continue;
    if (!ids.has(k.lag1Id) || !ids.has(k.lag2Id)) continue;
    if (k.lag1Poeng > k.lag2Poeng) mini[k.lag1Id].seire++;
    else                            mini[k.lag2Id].seire++;
  }
  const totaler  = gruppe.map(l => mini[l.lagId].seire);
  const erSirkel = totaler.every(s => s === totaler[0]);
  const tiebreakType = erSirkel ? 'poengdiff' : 'innbyrdes';
  const sortert = [...gruppe].sort((a, b) => {
    const innS = mini[b.lagId].seire - mini[a.lagId].seire;
    if (!erSirkel && innS !== 0) return innS;
    if (b.pd !== a.pd) return b.pd - a.pd;
    return b.pf - a.pf;
  });
  sortert.forEach(l => { l.tiebreakType = tiebreakType; });
  return sortert;
}

// ── KAMPER ────────────────────────────────────────────────
function renderKamper(t, lagMap) {
  const puljer = t.puljer ?? [];
  const sl     = t.sluttspill;
  let html     = '';

  // Puljekamper
  for (const p of puljer) {
    const ferdig = (p.kamper ?? []).filter(k => k.ferdig);
    if (!ferdig.length) continue;

    const runder = {};
    for (const k of ferdig) {
      const r = k.runde ?? 1;
      if (!runder[r]) runder[r] = [];
      runder[r].push(k);
    }

    html += `<div class="seksjon-tittel">${esc(p.navn)}</div><div class="kort">`;
    for (const rNr of Object.keys(runder).sort((a,b)=>a-b)) {
      html += `<div class="kamp-liste-item" style="background:rgba(0,0,0,.15)">
        <div class="kamp-meta">Runde ${rNr}</div>
      </div>`;
      for (const k of runder[rNr]) {
        const l1 = lagMap[k.lag1Id]?.navn ?? '?';
        const l2 = lagMap[k.lag2Id]?.navn ?? '?';
        const v1 = k.lag1Poeng > k.lag2Poeng;
        html += `<div class="kamp-liste-item">
          <div class="kamp-lag-rad">
            <span class="kamp-lag-navn${v1?' v':''}">${esc(l1)}</span>
            <span class="kamp-lag-score${v1?'':' t'}">${k.lag1Poeng}</span>
          </div>
          <div class="kamp-lag-rad">
            <span class="kamp-lag-navn${!v1?' v':''}">${esc(l2)}</span>
            <span class="kamp-lag-score${!v1?'':' t'}">${k.lag2Poeng}</span>
          </div>
          ${gameDetaljerHTML(k)}
        </div>`;
      }
    }
    html += '</div>';
  }

  // Sluttspillkamper
  const renderSlKamper = (kamper, tittel, farge) => {
    if (!kamper?.length) return '';
    const ferdig = kamper.filter(k => k.ferdig);
    if (!ferdig.length) return '';
    const runder = grupperPerRunde(ferdig);
    let h = `<div class="seksjon-tittel" style="color:${farge}">${tittel}</div><div class="kort">`;
    for (const [rundeNavn, kampListe] of runder) {
      h += `<div class="kamp-liste-item" style="background:rgba(0,0,0,.15)">
        <div class="kamp-meta">${esc(rundeNavn)}</div></div>`;
      for (const k of kampListe) {
        const l1 = lagMap[k.lag1Id]?.navn ?? '?';
        const l2 = lagMap[k.lag2Id]?.navn ?? '?';
        const v1 = k.lag1Poeng > k.lag2Poeng;
        h += `<div class="kamp-liste-item">
          <div class="kamp-lag-rad">
            <span class="kamp-lag-navn${v1?' v':''}">${esc(l1)}</span>
            <span class="kamp-lag-score${v1?'':' t'}">${k.lag1Poeng}</span>
          </div>
          <div class="kamp-lag-rad">
            <span class="kamp-lag-navn${!v1?' v':''}">${esc(l2)}</span>
            <span class="kamp-lag-score${!v1?'':' t'}">${k.lag2Poeng}</span>
          </div>
          ${gameDetaljerHTML(k)}
        </div>`;
      }
    }
    h += '</div>';
    return h;
  };

  html += renderSlKamper(sl?.A?.kamper, 'A-sluttspill', '#f5c842');
  html += renderSlKamper(sl?.B?.kamper, 'B-sluttspill', '#60a5fa');
  html += renderSlKamper(sl?.C?.kamper, 'C-sluttspill', '#7a90a8');

  return html || '<div class="tom">Ingen ferdigspilte kamper ennå.</div>';
}

// ════════════════════════════════════════════════════════
// KAMPSKJEMA — logikk og rendering
// ════════════════════════════════════════════════════════

/**
 * Finner kamper fra neste runde der begge lag er ledige.
 * Et lag er ledig hvis det har en ferdig kamp i gjeldende runde
 * og ikke noen uferdig kamp i samme runde.
 *
 * Respekterer antallBaner — maks N kamper kan vises som «kan spilles nå».
 */
function finnTilgjengeligeKamper(alleKamper, gjeldendeRunde, antallBaner) {
  const maks = antallBaner ?? 6;

  // Finn lag som er ferdige i gjeldende runde
  const ferdigeIRunde = new Set();
  const uferdigeIRunde = new Set();

  for (const k of alleKamper) {
    if (k.runde !== gjeldendeRunde) continue;
    const lag = [k.lag1Id, k.lag2Id].filter(Boolean);
    if (k.ferdig) {
      lag.forEach(id => ferdigeIRunde.add(id));
    } else {
      lag.forEach(id => uferdigeIRunde.add(id));
    }
  }

  // Ledige lag = ferdig i gjeldende runde OG ikke opptatt i samme runde
  const ledigeLag = new Set([...ferdigeIRunde].filter(id => !uferdigeIRunde.has(id)));
  if (!ledigeLag.size) return [];

  // Finn kamper i neste runde der begge lag er ledige
  const nesteRunde = gjeldendeRunde + 1;
  const tilgjengelige = [];

  for (const k of alleKamper) {
    if (k.runde !== nesteRunde || k.ferdig) continue;
    if (!k.lag1Id || !k.lag2Id) continue;
    if (ledigeLag.has(k.lag1Id) && ledigeLag.has(k.lag2Id)) {
      tilgjengelige.push(k);
      if (tilgjengelige.length >= maks) break;
    }
  }

  return tilgjengelige;
}

/**
 * Finner gjeldende runde — den laveste runden med uferdige kamper.
 */
function finnGjeldendeRunde(alleKamper) {
  const uferdigeRunder = alleKamper
    .filter(k => !k.ferdig)
    .map(k => k.runde)
    .filter(r => r != null);
  if (!uferdigeRunder.length) return null;
  return Math.min(...uferdigeRunder);
}

/**
 * Rendrer én tabellrad med kamper for en runde.
 */
function _ksTabellRad(runde, kamper, lagMap, erNeste = false, dimIds = new Set()) {
  const celler = kamper.map(k => {
    const l1 = lagMap[k.lag1Id]?.navn ?? k.lag1Id ?? '?';
    const l2 = lagMap[k.lag2Id]?.navn ?? k.lag2Id ?? '?';
    const dim = dimIds.has(k.lag1Id) || dimIds.has(k.lag2Id);
    if (k.ferdig) {
      const v1 = k.lag1Poeng > k.lag2Poeng;
      return `<td${dim ? ' class="ks-dim"' : ''}>
        <div class="${v1 ? 'ks-vinner' : 'ks-taper'}">${esc(l1)}</div>
        <div class="ks-sk">vs</div>
        <div class="${!v1 ? 'ks-vinner' : 'ks-taper'}">${esc(l2)}</div>
        <div style="margin-top:3px">
          <span class="${v1 ? 'ks-rv' : 'ks-rt'}">${v1 ? k.lag1Poeng : k.lag2Poeng}</span>
          <span class="${v1 ? 'ks-rt' : 'ks-rv'}">–${v1 ? k.lag2Poeng : k.lag1Poeng}</span>
        </div>
      </td>`;
    }
    return `<td${dim ? ' class="ks-dim"' : ''}>
      <div class="ks-l1">${esc(l1)}</div>
      <div class="ks-sk">vs</div>
      <div class="ks-l2">${esc(l2)}</div>
    </td>`;
  });

  const rowKl = erNeste ? ' class="ks-gronn-rad"' : '';
  return `<tr${rowKl}><td class="ks-rtd">R${runde}</td>${celler.join('')}</tr>`;
}

function renderKampskjema(t, lagMap) {
  const puljer      = t.puljer ?? [];
  const antallBaner = t.konfig?.antallBaner ?? 6;

  if (!puljer.length) return '<div class="tom">Kampskjema vises når puljespill er startet.</div>';

  // Slå sammen alle kamper fra alle puljer til én liste
  const alleKamper = puljer
    .flatMap(p => p.kamper ?? [])
    .sort((a, b) => a.runde - b.runde);

  const totalt       = alleKamper.length;
  const ferdigAntall = alleKamper.filter(k => k.ferdig).length;
  if (!totalt) return '<div class="tom">Ingen kamper planlagt ennå.</div>';

  const progProsent    = Math.round((ferdigAntall / totalt) * 100);
  const gjeldendeRunde = finnGjeldendeRunde(alleKamper);

  const tilgjengelige   = gjeldendeRunde != null
    ? finnTilgjengeligeKamper(alleKamper, gjeldendeRunde, antallBaner)
    : [];
  const tilgjengeligIds = new Set(tilgjengelige.flatMap(k => [k.lag1Id, k.lag2Id]));

  const perRunde = {};
  for (const k of alleKamper) {
    if (!perRunde[k.runde]) perRunde[k.runde] = [];
    perRunde[k.runde].push(k);
  }
  const rundeNr        = Object.keys(perRunde).map(Number).sort((a, b) => a - b);
  const ferdigeRunder  = rundeNr.filter(r => (perRunde[r] ?? []).every(k => k.ferdig));
  const uferdigeRunder = rundeNr.filter(r => (perRunde[r] ?? []).some(k => !k.ferdig));

  let html = `<div class="ks-wrap">
    <div class="ks-hdr">
      <div class="ks-sub" style="font-size:13px">${ferdigAntall} av ${totalt} kamper ferdig</div>
    </div>
    <div class="ks-prog-bar"><div class="ks-prog-fill" style="width:${progProsent}%"></div></div>`;

  // ── SPILLES NÅ ──
  if (gjeldendeRunde != null) {
    const spillesNaa    = perRunde[gjeldendeRunde] ?? [];
    const ferdigeIRunde = spillesNaa.filter(k => k.ferdig);
    const dimIds        = new Set(ferdigeIRunde.flatMap(k => [k.lag1Id, k.lag2Id]));
    html += `<div class="ks-seksjon">Spilles nå</div>
    <div class="ks-kort"><div class="ks-scroll"><table class="ks-table"><tbody>
      ${_ksTabellRad(gjeldendeRunde, spillesNaa, lagMap, false, dimIds)}
    </tbody></table></div></div>`;
  }

  // ── KAN SPILLES NÅ ──
  if (tilgjengelige.length > 0) {
    const nesteRunde = gjeldendeRunde + 1;
    const alleNesteR = perRunde[nesteRunde] ?? [];
    const dimIdsNeste = new Set(
      alleNesteR
        .filter(k => !tilgjengeligIds.has(k.lag1Id) || !tilgjengeligIds.has(k.lag2Id))
        .flatMap(k => [k.lag1Id, k.lag2Id])
    );
    html += `<div class="ks-seksjon-gronn"><div class="ks-puls"></div>Kan spilles nå</div>
    <div class="ks-kort"><div class="ks-scroll"><table class="ks-table"><tbody>
      ${_ksTabellRad(nesteRunde, alleNesteR, lagMap, true, dimIdsNeste)}
    </tbody></table></div></div>`;
  }

  // ── NESTE KAMPER ──
  const nesteVist        = tilgjengelige.length > 0 ? gjeldendeRunde + 1 : gjeldendeRunde;
  const fremtidigeRunder = uferdigeRunder.filter(r =>
    gjeldendeRunde == null ? false : r > nesteVist
  );
  if (fremtidigeRunder.length) {
    html += `<div class="ks-seksjon">Neste kamper</div>
    <div class="ks-kort"><div class="ks-scroll"><table class="ks-table"><tbody>`;
    for (const r of fremtidigeRunder) {
      html += _ksTabellRad(r, perRunde[r], lagMap, false, new Set());
    }
    html += `</tbody></table></div></div>`;
  }

  // ── SPILTE KAMPER ──
  if (ferdigeRunder.length) {
    html += `<div class="ks-seksjon">Spilte kamper</div>
    <div class="ks-kort"><div class="ks-scroll"><table class="ks-table"><tbody>`;
    for (const r of [...ferdigeRunder].reverse()) {
      html += _ksTabellRad(r, perRunde[r], lagMap, false, new Set());
    }
    html += `</tbody></table></div></div>`;
  }

  html += '</div>';
  return html;
}

// ── RANGERING ────────────────────────────────────────────
function renderRangering(t, lagMap) {
  const rangering = t.rangering ?? [];
  const erFerdig  = t.status === 'finished';

  if (!rangering.length) {
    return '<div class="tom">' + (erFerdig ? 'Ingen rangering tilgjengelig.' : 'Rangering vises etter turneringen er avsluttet.') + '</div>';
  }

  const medal = p => p===1?'🥇':p===2?'🥈':p===3?'🥉':'';
  const farge = p => p===1?'var(--yellow)':p<=3?'var(--accent2)':'var(--muted2)';
  const klasse = p => p===1?'gull':p===2?'sølv':p===3?'bronse':'';

  let html = '';
  if (!erFerdig) html += '<div style="background:rgba(245,200,66,.08);border:1px solid rgba(245,200,66,.2);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:14px;color:var(--yellow)">Foreløpig rangering</div>';

  html += `<div class="kort">
    ${rangering.map(r => `
      <div class="rang-rad ${klasse(r.plass)}">
        <div class="rang-nummer" style="color:${farge(r.plass)}">${medal(r.plass)||r.plass+'.'}</div>
        <div class="rang-lagnavn">${esc(r.navn ?? lagMap[r.lagId]?.navn ?? '?')}</div>
        <div class="rang-plass">${r.plass}.</div>
      </div>`).join('')}
  </div>`;
  return html;
}

// ── HJELPER ───────────────────────────────────────────────
function esc(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/** Rendrer game-detaljer for best-av-3 kamper. */
function gameDetaljerHTML(kamp) {
  if (!kamp.ferdig || !kamp.games?.length) return '';
  const deler = kamp.games.map((g, i) => {
    const g1Vant = g.l1 > g.l2;
    const skille = i < kamp.games.length - 1 ? '<span class="g-skille"> · </span>' : '';
    return `<span class="${g1Vant ? 'g-vinner' : 'g-taper'}">${g.l1}</span>`
         + `<span class="g-skille">–</span>`
         + `<span class="${!g1Vant ? 'g-vinner' : 'g-taper'}">${g.l2}</span>`
         + skille;
  }).join('');
  return `<div class="game-detaljer">${deler}</div>`;
}
